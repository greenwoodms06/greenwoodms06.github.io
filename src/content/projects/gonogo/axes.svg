<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="Three composable axes feeding one component: Policy (how conditions combine), an optional Time Constraint (timing rules), and Condition Type (what each entry is). Pick one from each axis independently; all three feed a single GoNoGo checklist component.">
  <rect width="760" height="540" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="13" fill="#5f6368" letter-spacing="0.10em">THREE COMPOSABLE AXES — PICK ONE FROM EACH, INDEPENDENTLY</text>

  <defs>
    <marker id="ahb" markerWidth="11" markerHeight="11" refX="6" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#4285f4"/></marker>
  </defs>

  <!-- column headers -->
  <text x="150" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Policy</text>
  <text x="150" y="86" text-anchor="middle" font-size="11" fill="#5f6368">how conditions combine</text>
  <text x="380" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Time Constraint</text>
  <text x="380" y="86" text-anchor="middle" font-size="11" fill="#5f6368">optional — timing rules</text>
  <text x="610" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Condition Type</text>
  <text x="610" y="86" text-anchor="middle" font-size="11" fill="#5f6368">what each entry is</text>

  <!-- ===== Policy column ===== -->
  <rect x="55" y="100" width="190" height="44" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2.4"/>
  <text x="150" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#1967d2">AllRequired</text>
  <rect x="55" y="156" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="150" y="177" text-anchor="middle" font-size="13.5" fill="#202124">OrderedSequence</text>
  <text x="150" y="192" text-anchor="middle" font-size="10" fill="#5f6368">Forward · Reverse · Custom</text>
  <rect x="55" y="212" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="150" y="239" text-anchor="middle" font-size="13.5" fill="#202124">AnyNOfM</text>
  <rect x="55" y="268" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="150" y="295" text-anchor="middle" font-size="13.5" fill="#202124">WeightedThreshold</text>

  <!-- ===== Time Constraint column ===== -->
  <rect x="285" y="100" width="190" height="44" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2.4"/>
  <text x="380" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#1967d2">Deadline</text>
  <rect x="285" y="156" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="380" y="177" text-anchor="middle" font-size="13.5" fill="#202124">TargetTime</text>
  <text x="380" y="192" text-anchor="middle" font-size="10" fill="#5f6368">4 modes</text>
  <rect x="285" y="212" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="380" y="239" text-anchor="middle" font-size="13.5" fill="#202124">RateConstrained</text>
  <rect x="285" y="268" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="380" y="295" text-anchor="middle" font-size="13.5" fill="#202124">Composite</text>
  <rect x="285" y="324" width="190" height="44" rx="10" fill="#ffffff" stroke="#5f6368" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="380" y="351" text-anchor="middle" font-size="13.5" fill="#5f6368">(none)</text>

  <!-- ===== Condition Type column ===== -->
  <rect x="515" y="100" width="190" height="44" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2.4"/>
  <text x="610" y="127" text-anchor="middle" font-size="14" font-weight="700" fill="#1967d2">Bool</text>
  <rect x="515" y="156" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="610" y="183" text-anchor="middle" font-size="13.5" fill="#202124">TimedBool</text>
  <rect x="515" y="212" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="610" y="239" text-anchor="middle" font-size="13.5" fill="#202124">DataAssetChecklist</text>
  <rect x="515" y="268" width="190" height="44" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.6"/>
  <text x="610" y="295" text-anchor="middle" font-size="13.5" fill="#202124">ActorChecklist</text>

  <!-- connectors into component -->
  <path d="M150,316 C150,360 270,372 318,402" fill="none" stroke="#4285f4" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahb)"/>
  <path d="M380,372 C380,388 380,392 380,402" fill="none" stroke="#4285f4" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahb)"/>
  <path d="M610,316 C610,360 490,372 442,402" fill="none" stroke="#4285f4" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahb)"/>

  <!-- component box -->
  <rect x="200" y="406" width="360" height="66" rx="14" fill="#202124" stroke="#202124"/>
  <text x="380" y="436" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">GoNoGo Checklist Component</text>
  <text x="380" y="457" text-anchor="middle" font-size="11.5" fill="#bdc1c6">one component · three drop-downs · no rewrite</text>

  <!-- caption -->
  <text x="380" y="492" text-anchor="middle" font-size="10.5" fill="#4285f4" font-style="italic">Blue pills show one example selection — one per axis.</text>
  <text x="380" y="514" text-anchor="middle" font-size="11.5" fill="#5f6368">A checklist doesn't know what type each condition is. A policy doesn't know about time.</text>
  <text x="380" y="531" text-anchor="middle" font-size="11.5" fill="#5f6368">The three axes compose freely — that's the abstraction the rest of the plugin earns its keep against.</text>
</svg>
