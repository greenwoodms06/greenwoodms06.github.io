<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="smBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <marker id="smArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#smBg)"/>

  <text x="400" y="86" font-size="17" font-weight="700" letter-spacing="3" fill="#10b981" text-anchor="middle">UNREAL LEVELS &#8646; JSON, ROUND-TRIP</text>

  <!-- left: a level (cluster of isometric cubes) -->
  <g>
    <!-- back cube -->
    <g transform="translate(150,212)">
      <polygon points="0,-22 22,-11 0,0 -22,-11" fill="#6ee7b7"/>
      <polygon points="-22,-11 0,0 0,22 -22,11" fill="#34d399"/>
      <polygon points="22,-11 0,0 0,22 22,11" fill="#10b981"/>
    </g>
    <!-- front-left cube -->
    <g transform="translate(124,252)">
      <polygon points="0,-22 22,-11 0,0 -22,-11" fill="#6ee7b7"/>
      <polygon points="-22,-11 0,0 0,22 -22,11" fill="#34d399"/>
      <polygon points="22,-11 0,0 0,22 22,11" fill="#10b981"/>
    </g>
    <!-- front-right cube -->
    <g transform="translate(176,252)">
      <polygon points="0,-22 22,-11 0,0 -22,-11" fill="#6ee7b7"/>
      <polygon points="-22,-11 0,0 0,22 -22,11" fill="#34d399"/>
      <polygon points="22,-11 0,0 0,22 22,11" fill="#10b981"/>
    </g>
  </g>
  <text x="150" y="330" font-size="13" font-weight="700" letter-spacing="1" fill="#047857" text-anchor="middle">UE LEVEL</text>

  <!-- center: round-trip arrows -->
  <text x="377" y="222" font-size="13" font-weight="700" letter-spacing="2" fill="#047857" text-anchor="middle">EXPORT</text>
  <path d="M 214 236 L 540 236" stroke="#059669" stroke-width="4" marker-end="url(#smArr)"/>
  <path d="M 540 290 L 214 290" stroke="#059669" stroke-width="4" marker-end="url(#smArr)"/>
  <text x="377" y="312" font-size="13" font-weight="700" letter-spacing="2" fill="#047857" text-anchor="middle">IMPORT</text>

  <!-- right: JSON document -->
  <g transform="translate(558,202)">
    <rect x="0" y="0" width="104" height="124" rx="11" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <text x="16" y="36" font-size="22" font-weight="700" fill="#047857">{</text>
    <rect x="34" y="24" width="52" height="8" rx="4" fill="#a7f3d0"/>
    <rect x="34" y="44" width="40" height="8" rx="4" fill="#a7f3d0"/>
    <rect x="34" y="64" width="48" height="8" rx="4" fill="#a7f3d0"/>
    <rect x="34" y="84" width="34" height="8" rx="4" fill="#a7f3d0"/>
    <text x="16" y="112" font-size="22" font-weight="700" fill="#047857">}</text>
  </g>
  <text x="610" y="354" font-size="13" font-weight="700" letter-spacing="1" fill="#047857" text-anchor="middle">manifest.json</text>

  <text x="400" y="432" font-size="14" font-weight="600" letter-spacing="2" fill="#34d399" text-anchor="middle">A LIGHTWEIGHT ALTERNATIVE TO USD</text>
</svg>
