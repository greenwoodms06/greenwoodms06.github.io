<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="chfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a1a1aa"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#chfBg)"/>

  <!-- axes -->
  <line x1="110" y1="420" x2="110" y2="60"  stroke="#a1a1aa" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="110" y1="410" x2="750" y2="410" stroke="#a1a1aa" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- CHF guide line + peak -->
  <line x1="110" y1="100" x2="330" y2="100" stroke="#fb923c" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- boiling curve: nucleate rise -> CHF peak -> transition dip -> film boiling -->
  <path d="M 120 405 C 230 400 290 360 330 100 C 370 150 470 312 525 300 C 615 288 685 240 735 185"
        fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="330" cy="100" r="9" fill="#f97316"/>

  <!-- labels -->
  <text x="345" y="92"  font-size="30" font-weight="700" fill="#ea580c">CHF</text>
  <text x="430" y="455" font-size="26" fill="#71717a" text-anchor="middle">&#916;T (wall superheat)</text>
  <text x="60"  y="245" font-size="26" fill="#71717a" text-anchor="middle" transform="rotate(-90 60 245)">q&#8243; (heat flux)</text>
</svg>
