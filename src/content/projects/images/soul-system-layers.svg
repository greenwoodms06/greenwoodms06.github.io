<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="soulBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#soulBg)"/>

  <!-- Universe: outer ring -->
  <rect x="90"  y="55"  width="620" height="390" rx="44" fill="#ffffff" stroke="#fdba74" stroke-width="4"/>
  <text x="118" y="92" font-size="22" font-weight="700" letter-spacing="2" fill="#fb923c">UNIVERSE</text>

  <!-- Body: middle ring -->
  <rect x="190" y="120" width="420" height="260" rx="34" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <text x="216" y="153" font-size="20" font-weight="700" letter-spacing="2" fill="#ea580c">BODY</text>

  <!-- Council voices: small satellite dots around the Soul -->
  <g fill="#fdba74">
    <circle cx="400" cy="160" r="9"/>
    <circle cx="505" cy="205" r="9"/>
    <circle cx="505" cy="295" r="9"/>
    <circle cx="400" cy="340" r="9"/>
    <circle cx="295" cy="295" r="9"/>
    <circle cx="295" cy="205" r="9"/>
  </g>

  <!-- Soul: the governing core -->
  <circle cx="400" cy="250" r="66" fill="#f97316"/>
  <text x="400" y="259" font-size="24" font-weight="700" letter-spacing="1" fill="#ffffff" text-anchor="middle">SOUL</text>
</svg>
