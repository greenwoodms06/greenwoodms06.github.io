<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#202124">The Transformation Paradox</text>
  <text x="460" y="64" text-anchor="middle" font-size="15" fill="#5f6368">Why modeling <tspan font-style="italic">today's</tspan> taste suppresses <tspan font-style="italic">tomorrow's</tspan> canon</text>

  <!-- Axes -->
  <line x1="95" y1="95" x2="95" y2="380" stroke="#9aa0a6" stroke-width="2"/>
  <line x1="95" y1="380" x2="850" y2="380" stroke="#9aa0a6" stroke-width="2"/>
  <text x="86" y="230" text-anchor="middle" font-size="14" fill="#5f6368" transform="rotate(-90 86 230)">Audience valuation &#8594;</text>
  <text x="472" y="410" text-anchor="middle" font-size="14" fill="#5f6368">Time &#8594;</text>
  <text x="180" y="402" text-anchor="middle" font-size="13" fill="#5f6368">Debut</text>
  <text x="770" y="402" text-anchor="middle" font-size="13" fill="#5f6368">Decades later</text>

  <!-- Conventional curve (amber): high now, fades -->
  <path d="M180,150 C 400,170 650,225 820,250" fill="none" stroke="#f9ab00" stroke-width="3.5"/>
  <!-- Transformational curve (blue): rejected at debut, rises to canonical -->
  <path d="M180,335 C 430,345 560,190 820,120" fill="none" stroke="#4285f4" stroke-width="3.5"/>

  <!-- debut markers -->
  <circle cx="180" cy="150" r="5" fill="#f9ab00"/>
  <circle cx="180" cy="335" r="5" fill="#4285f4"/>

  <!-- annotation: rejected at debut -->
  <text x="300" y="345" font-size="14" fill="#13346b">Rejected / derided at debut</text>
  <path d="M298 340 C 250 332, 215 334, 188 335" fill="none" stroke="#4285f4" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- annotation: later canonical -->
  <text x="700" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#13346b">Later: canonical</text>

  <!-- annotation: conventional -->
  <text x="690" y="280" text-anchor="middle" font-size="14" fill="#7a5c00">Conventional work:</text>
  <text x="690" y="299" text-anchor="middle" font-size="14" fill="#7a5c00">liked now, fades</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4285f4"/></marker>
  </defs>

  <!-- callout box -->
  <rect x="150" y="120" width="300" height="70" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="300" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#13346b">An AI trained on TODAY's taste</text>
  <text x="300" y="169" text-anchor="middle" font-size="14" fill="#13346b">scores the rising curve LOW —</text>
  <text x="300" y="184" text-anchor="middle" font-size="13" fill="#13346b">generating, then rejecting, the future.</text>

  <!-- legend -->
  <rect x="560" y="335" width="16" height="16" rx="3" fill="#f9ab00"/>
  <text x="583" y="348" font-size="13" fill="#3c4043">Conventional / derivative</text>
  <rect x="560" y="357" width="16" height="16" rx="3" fill="#4285f4"/>
  <text x="583" y="370" font-size="13" fill="#3c4043">Transformational</text>
</svg>
