<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="560" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="17" fill="#5f6368" letter-spacing="0.08em">ALPHAGO MOVE 37</text>
  <text x="460" y="56" text-anchor="middle" font-size="14" fill="#5f6368">Game 2 vs Lee Sedol, 10 March 2016 &#8212; a shoulder hit outside the human distribution</text>

  <!-- Board background -->
  <rect x="80" y="80" width="540" height="460" rx="6" fill="#e6c388" stroke="#9c6f2a" stroke-width="2"/>

  <!-- 19x19 grid: 18 cells, 27px each, board interior 540 wide leaves 26px padding on each side -->
  <!-- Vertical lines -->
  <g stroke="#3c2a14" stroke-width="1">
    <line x1="106" y1="106" x2="106" y2="514"/>
    <line x1="133" y1="106" x2="133" y2="514"/>
    <line x1="160" y1="106" x2="160" y2="514"/>
    <line x1="187" y1="106" x2="187" y2="514"/>
    <line x1="214" y1="106" x2="214" y2="514"/>
    <line x1="241" y1="106" x2="241" y2="514"/>
    <line x1="268" y1="106" x2="268" y2="514"/>
    <line x1="295" y1="106" x2="295" y2="514"/>
    <line x1="322" y1="106" x2="322" y2="514"/>
    <line x1="349" y1="106" x2="349" y2="514"/>
    <line x1="376" y1="106" x2="376" y2="514"/>
    <line x1="403" y1="106" x2="403" y2="514"/>
    <line x1="430" y1="106" x2="430" y2="514"/>
    <line x1="457" y1="106" x2="457" y2="514"/>
    <line x1="484" y1="106" x2="484" y2="514"/>
    <line x1="511" y1="106" x2="511" y2="514"/>
    <line x1="538" y1="106" x2="538" y2="514"/>
    <line x1="565" y1="106" x2="565" y2="514"/>
    <line x1="592" y1="106" x2="592" y2="514"/>
  </g>
  <!-- Horizontal lines -->
  <g stroke="#3c2a14" stroke-width="1">
    <line x1="106" y1="106" x2="592" y2="106"/>
    <line x1="106" y1="129" x2="592" y2="129"/>
    <line x1="106" y1="152" x2="592" y2="152"/>
    <line x1="106" y1="175" x2="592" y2="175"/>
    <line x1="106" y1="198" x2="592" y2="198"/>
    <line x1="106" y1="221" x2="592" y2="221"/>
    <line x1="106" y1="244" x2="592" y2="244"/>
    <line x1="106" y1="267" x2="592" y2="267"/>
    <line x1="106" y1="290" x2="592" y2="290"/>
    <line x1="106" y1="313" x2="592" y2="313"/>
    <line x1="106" y1="336" x2="592" y2="336"/>
    <line x1="106" y1="359" x2="592" y2="359"/>
    <line x1="106" y1="382" x2="592" y2="382"/>
    <line x1="106" y1="405" x2="592" y2="405"/>
    <line x1="106" y1="428" x2="592" y2="428"/>
    <line x1="106" y1="451" x2="592" y2="451"/>
    <line x1="106" y1="474" x2="592" y2="474"/>
    <line x1="106" y1="497" x2="592" y2="497"/>
    <line x1="106" y1="514" x2="592" y2="514"/>
  </g>

  <!-- Star points (hoshi) at 4-4, 4-10, 4-16, 10-4, 10-10, 10-16, 16-4, 16-10, 16-16 -->
  <!-- 4-4 = (187,187), 10-10 = (349,313), 16-16 = (511,439). step 27, origin (106,106), idx 0-based so col c => 106 + c*27 -->
  <g fill="#3c2a14">
    <circle cx="187" cy="187" r="3.5"/>
    <circle cx="349" cy="187" r="3.5"/>
    <circle cx="511" cy="187" r="3.5"/>
    <circle cx="187" cy="313" r="3.5"/>
    <circle cx="349" cy="313" r="3.5"/>
    <circle cx="511" cy="313" r="3.5"/>
    <circle cx="187" cy="439" r="3.5"/>
    <circle cx="349" cy="439" r="3.5"/>
    <circle cx="511" cy="439" r="3.5"/>
  </g>

  <!-- Illustrative context stones around right side (not the literal game record — see caption) -->
  <!-- White stones (Lee Sedol) -->
  <g>
    <circle cx="538" cy="290" r="12" fill="#fafafa" stroke="#3c2a14" stroke-width="0.8"/>
    <circle cx="565" cy="313" r="12" fill="#fafafa" stroke="#3c2a14" stroke-width="0.8"/>
    <circle cx="565" cy="267" r="12" fill="#fafafa" stroke="#3c2a14" stroke-width="0.8"/>
  </g>
  <!-- Black stones (AlphaGo) -->
  <g>
    <circle cx="565" cy="244" r="12" fill="#1a1a1a"/>
    <circle cx="565" cy="336" r="12" fill="#1a1a1a"/>
  </g>

  <!-- MOVE 37 — black stone on the 5th line, with red ring -->
  <circle cx="484" cy="313" r="13" fill="#1a1a1a"/>
  <circle cx="484" cy="313" r="20" fill="none" stroke="#ea4335" stroke-width="3"/>
  <text x="484" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">37</text>

  <!-- Annotation arrow + label -->
  <path d="M680 313 L 506 313" fill="none" stroke="#ea4335" stroke-width="2" marker-end="url(#ahR)"/>
  <text x="700" y="298" font-size="14" font-weight="700" fill="#5c1a14">Move 37 &#8212; 5th line</text>
  <text x="700" y="318" font-size="13" fill="#5c1a14">shoulder hit, far from the action;</text>
  <text x="700" y="336" font-size="13" fill="#5c1a14">human masters initially called it</text>
  <text x="700" y="354" font-size="13" font-style="italic" fill="#5c1a14">an error.</text>

  <!-- Below board: outcome -->
  <text x="350" y="538" text-anchor="middle" font-size="13" fill="#5f6368"><tspan font-weight="700">Outcome:</tspan> AlphaGo won the game. The move was later judged beautiful.</text>

  <!-- Caption disclaimer -->
  <text x="700" y="430" font-size="11" fill="#5f6368">Illustrative diagram, not the literal game record;</text>
  <text x="700" y="446" font-size="11" fill="#5f6368">the surrounding stones are schematic.</text>
  <text x="700" y="462" font-size="11" fill="#5f6368">Source: Silver et al. 2016, <tspan font-style="italic">Nature</tspan>.</text>

  <defs>
    <marker id="ahR" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ea4335"/></marker>
  </defs>
</svg>
