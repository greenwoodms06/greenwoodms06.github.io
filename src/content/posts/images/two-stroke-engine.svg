<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="380" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="17" fill="#5f6368" letter-spacing="0.08em">THE TWO-STROKE ENGINE OF CREATIVITY</text>
  <text x="460" y="56" text-anchor="middle" font-size="14" fill="#5f6368">Generate options · then judge which one is good</text>

  <!-- Problem pill -->
  <rect x="40" y="178" width="120" height="44" rx="22" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.5"/>
  <text x="100" y="206" text-anchor="middle" font-size="14" fill="#202124">Problem / prompt</text>

  <!-- Divergent box (green) -->
  <rect x="200" y="140" width="240" height="120" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="320" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0b3d1f" letter-spacing="0.04em">DIVERGENT STROKE — GENERATE</text>
  <text x="320" y="200" text-anchor="middle" font-size="15" fill="#1e4d2b">Produce many novel options</text>
  <text x="320" y="222" text-anchor="middle" font-size="13" font-style="italic" fill="#1e4d2b">fluency · flexibility · originality</text>

  <!-- Convergent box (red) -->
  <rect x="480" y="140" width="240" height="120" rx="12" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="600" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#5c1a14" letter-spacing="0.04em">CONVERGENT STROKE — EVALUATE</text>
  <text x="600" y="200" text-anchor="middle" font-size="15" fill="#7a221a">Judge which one is valuable</text>
  <text x="600" y="222" text-anchor="middle" font-size="13" font-style="italic" fill="#7a221a">aptness · constraint-fit · taste</text>

  <!-- Output pill -->
  <rect x="760" y="178" width="120" height="44" rx="22" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="820" y="206" text-anchor="middle" font-size="14" fill="#13346b">Creative output</text>

  <!-- Arrows between blocks -->
  <path d="M160 200 L 198 200" fill="none" stroke="#5f6368" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M440 200 L 478 200" fill="none" stroke="#5f6368" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M720 200 L 758 200" fill="none" stroke="#5f6368" stroke-width="2" marker-end="url(#ah)"/>

  <!-- AI strong annotation (under divergent) -->
  <rect x="200" y="290" width="240" height="70" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="320" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">AI: superhuman here</text>
  <text x="320" y="338" text-anchor="middle" font-size="12" fill="#1e4d2b">tireless · no fixation · no ego</text>
  <path d="M320 285 L 320 262" fill="none" stroke="#34a853" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ahG)"/>

  <!-- AI weak annotation (under convergent) -->
  <rect x="480" y="290" width="240" height="70" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="600" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#5c1a14">AI: contested here</text>
  <text x="600" y="338" text-anchor="middle" font-size="12" fill="#7a221a">needs a value signal it can trust</text>
  <path d="M600 285 L 600 262" fill="none" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ahR)"/>

  <defs>
    <marker id="ah"  markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5f6368"/></marker>
    <marker id="ahG" markerWidth="9"  markerHeight="9"  refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34a853"/></marker>
    <marker id="ahR" markerWidth="9"  markerHeight="9"  refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ea4335"/></marker>
  </defs>
</svg>
