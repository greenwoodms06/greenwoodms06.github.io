<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" width="760" height="760"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="DSTF's six-layer pipeline: Source, Discovery, Backend/Runner, Dataset, Metric, MetricTree, with five simulator backends fanning out under the Backend layer">
  <rect width="760" height="760" fill="#ffffff"/>
  <text x="235" y="34" text-anchor="middle" font-size="14" fill="#5f6368" letter-spacing="0.10em">THE PLUG-IN SPINE — ONE TEST, SIX LAYERS</text>

  <defs>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="6" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- vertical flow arrows (x=235) -->
  <g stroke="#5f6368" stroke-width="2.4" fill="none" marker-end="url(#ah)">
    <line x1="235" y1="144" x2="235" y2="172"/>
    <line x1="235" y1="256" x2="235" y2="284"/>
    <line x1="235" y1="368" x2="235" y2="396"/>
    <line x1="235" y1="480" x2="235" y2="508"/>
    <line x1="235" y1="592" x2="235" y2="620"/>
  </g>

  <!-- backend fan connectors (Backend box right edge -> each pill) -->
  <g stroke="#4285f4" stroke-width="1.6" fill="none" opacity="0.85">
    <line x1="410" y1="328" x2="470" y2="246"/>
    <line x1="410" y1="328" x2="470" y2="287"/>
    <line x1="410" y1="328" x2="470" y2="328"/>
    <line x1="410" y1="328" x2="470" y2="369"/>
    <line x1="410" y1="328" x2="470" y2="410"/>
  </g>

  <!-- six layer boxes (gray) -->
  <g>
    <rect x="60" y="64" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="98" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">Source</text>
    <text x="235" y="122" text-anchor="middle" font-size="13" fill="#5f6368">.mo · FMU · .jl · Python · CSV</text>

    <rect x="60" y="176" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">Discovery</text>
    <text x="235" y="234" text-anchor="middle" font-size="13" fill="#5f6368">annotations · test_spec.json</text>

    <rect x="60" y="288" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="322" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">Backend / Runner</text>
    <text x="235" y="346" text-anchor="middle" font-size="13" fill="#5f6368">how a test is executed</text>

    <rect x="60" y="400" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="434" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">Dataset</text>
    <text x="235" y="458" text-anchor="middle" font-size="13" fill="#5f6368">TimeSeries · Events · Spectrum</text>

    <rect x="60" y="512" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="546" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">Metric</text>
    <text x="235" y="570" text-anchor="middle" font-size="13" fill="#5f6368">one scoring mode vs baseline</text>

    <rect x="60" y="624" width="350" height="80" rx="12" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
    <text x="235" y="654" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">MetricTree</text>
    <text x="235" y="678" text-anchor="middle" font-size="13" fill="#5f6368">compose → pass / fail + score + diagnostics</text>
  </g>

  <!-- five backend pills (blue) -->
  <g font-size="13" fill="#202124" text-anchor="middle">
    <rect x="470" y="229" width="250" height="34" rx="17" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
    <text x="595" y="251">Dymola</text>
    <rect x="470" y="270" width="250" height="34" rx="17" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
    <text x="595" y="292">OpenModelica</text>
    <rect x="470" y="311" width="250" height="34" rx="17" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
    <text x="595" y="333">FMPy</text>
    <rect x="470" y="352" width="250" height="34" rx="17" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
    <text x="595" y="374">Julia / MTK</text>
    <rect x="470" y="393" width="250" height="34" rx="17" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.6"/>
    <text x="595" y="415">Python — any simulate()</text>
  </g>
</svg>
