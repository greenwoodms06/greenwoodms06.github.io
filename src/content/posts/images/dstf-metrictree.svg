<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" width="800" height="470"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-label="A scoring tree: an OR of (NRMSE and frequency-drift against the primary baseline) with a loose tube, plus a warn-wrapped soft-check that can flag drift but never fail the build">
  <rect width="800" height="470" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="14" fill="#5f6368" letter-spacing="0.10em">A VERDICT IS A TREE, NOT AN EQUALITY CHECK</text>

  <defs>
    <marker id="aht" markerWidth="11" markerHeight="11" refX="6" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- edges -->
  <g stroke="#5f6368" stroke-width="2" fill="none" marker-end="url(#aht)">
    <line x1="400" y1="98" x2="195" y2="146"/>
    <line x1="400" y1="98" x2="400" y2="146"/>
    <line x1="400" y1="98" x2="640" y2="146"/>
    <line x1="195" y1="208" x2="120" y2="282"/>
    <line x1="195" y1="208" x2="285" y2="282"/>
    <line x1="640" y1="208" x2="655" y2="282"/>
  </g>

  <!-- ROOT: OR -->
  <rect x="350" y="56" width="100" height="42" rx="9" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
  <text x="400" y="83" text-anchor="middle" font-size="18" font-weight="700" fill="#202124">OR</text>

  <!-- AND combinator -->
  <rect x="135" y="148" width="120" height="42" rx="9" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
  <text x="195" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#202124">AND</text>

  <!-- TUBE primary leaf (green) -->
  <rect x="318" y="146" width="164" height="60" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">tube envelope (loose)</text>
  <text x="400" y="192" text-anchor="middle" font-size="12.5" fill="#1e4d2b">vs primary</text>

  <!-- WARN wrapper (amber stadium) -->
  <rect x="588" y="148" width="104" height="42" rx="21" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="640" y="175" text-anchor="middle" font-size="16" font-weight="700" fill="#6b4e00">warn</text>

  <!-- NRMSE primary leaf -->
  <rect x="38" y="282" width="164" height="64" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="120" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">nrmse &lt; 0.01</text>
  <text x="120" y="330" text-anchor="middle" font-size="12.5" fill="#1e4d2b">vs primary</text>

  <!-- FREQ primary leaf -->
  <rect x="208" y="282" width="170" height="64" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="293" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">dom-frequency</text>
  <text x="293" y="324" text-anchor="middle" font-size="12.5" fill="#1e4d2b">drift &lt; 1% · vs primary</text>

  <!-- SOFT soft-check leaf (amber) -->
  <rect x="573" y="282" width="170" height="64" rx="10" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="658" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#6b4e00">nrmse vs dymola-via-fmpy</text>
  <text x="658" y="324" text-anchor="middle" font-size="12.5" fill="#7a5c00">soft-check</text>

  <text x="400" y="420" text-anchor="middle" font-size="14" fill="#5f6368">Pass if NRMSE is tight <tspan font-weight="700">and</tspan> the dominant frequency hasn't drifted, <tspan font-weight="700">or</tspan> the loose tube holds.</text>
  <text x="400" y="444" text-anchor="middle" font-size="14" fill="#5f6368">The <tspan fill="#6b4e00" font-weight="700">warn</tspan>-wrapped soft-check can flag drift but never fail the build.</text>
</svg>
