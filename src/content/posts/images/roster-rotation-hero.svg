<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Roster Rotation — rotation arrows above a row of equal bars">
  <rect width="1200" height="630" fill="#0f1923"/>

  <!-- Rotation-arrows mark (the app icon motif), centered. 24-unit icon space scaled ×10. -->
  <g transform="translate(480 70) scale(10)" fill="none" stroke="#00e676" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 1l4 4-4 4"/>
    <path d="M3 11V9a4 4 0 014-4h14"/>
    <path d="M7 23l-4-4 4-4"/>
    <path d="M21 13v2a4 4 0 01-4 4H3"/>
  </g>

  <!-- Equal bars = equal playing time; one keeper-yellow. Baseline y=470, height 92. -->
  <g>
    <rect x="388" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
    <rect x="452" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
    <rect x="516" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
    <rect x="580" y="378" width="40" height="92" rx="4" fill="#fdd835"/>
    <rect x="644" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
    <rect x="708" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
    <rect x="772" y="378" width="40" height="92" rx="4" fill="#8fa3b3"/>
  </g>

  <text x="600" y="545" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#e8eff5" letter-spacing="0.5">Roster Rotation</text>
  <text x="600" y="585" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#8fa3b3" letter-spacing="0.5">fair playing time, offline</text>
</svg>
