<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="580" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="17" fill="#5f6368" letter-spacing="0.08em">THREE VALUE ORACLES &#8212; AND THE DOMAIN SPLIT</text>
  <text x="460" y="56" text-anchor="middle" font-size="14" fill="#5f6368">Where the value-judgment comes from decides whether AI is autonomously creative</text>

  <!-- Root decision diamond -->
  <polygon points="460,90 660,160 460,230 260,160" fill="#f1f3f4" stroke="#5f6368" stroke-width="2"/>
  <text x="460" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Is &#8220;good&#8221; machine-checkable</text>
  <text x="460" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">in this domain?</text>

  <!-- YES branch label -->
  <text x="180" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#0b3d1f">YES</text>
  <text x="180" y="284" text-anchor="middle" font-size="12" fill="#1e4d2b">Go, proofs, code tests,</text>
  <text x="180" y="300" text-anchor="middle" font-size="12" fill="#1e4d2b">protein folding</text>

  <!-- NO branch label -->
  <text x="740" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#5c4400">NO &#8212; HUMAN TASTE</text>
  <text x="740" y="284" text-anchor="middle" font-size="12" fill="#7a5c00">art, writing, design,</text>
  <text x="740" y="300" text-anchor="middle" font-size="12" fill="#7a5c00">strategy</text>

  <!-- Branch arrows from root -->
  <path d="M310 195 C 250 220, 200 240, 180 250" fill="none" stroke="#34a853" stroke-width="2.5" marker-end="url(#ahG)"/>
  <path d="M610 195 C 670 220, 720 240, 740 250" fill="none" stroke="#f9ab00" stroke-width="2.5" marker-end="url(#ahA)"/>

  <!-- LEFT (solved) box: Oracle (ii) -->
  <rect x="40" y="320" width="320" height="180" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="200" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">Oracle (ii): the world / a scoreboard</text>
  <text x="200" y="382" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3d1f">AI closes the loop ALONE</text>
  <text x="200" y="404" text-anchor="middle" font-size="13" fill="#1e4d2b">&#8212; even transformationally.</text>
  <text x="200" y="432" text-anchor="middle" font-size="13" fill="#1e4d2b">Canonical instance:</text>
  <text x="200" y="450" text-anchor="middle" font-size="13" font-style="italic" fill="#1e4d2b">AlphaGo Move 37 (2016).</text>
  <text x="200" y="478" text-anchor="middle" font-size="12" fill="#0b3d1f">Verdict: SOLVED &#8226; sometimes transformational</text>

  <!-- Right intermediate decision diamond -->
  <polygon points="740,330 880,380 740,430 600,380" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="740" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#5c4400">Model WHOSE</text>
  <text x="740" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#5c4400">preference?</text>

  <!-- Branch arrows out of second diamond -->
  <path d="M680 405 C 600 425, 540 430, 500 450" fill="none" stroke="#f9ab00" stroke-width="2.5" marker-end="url(#ahA)"/>
  <path d="M800 405 C 830 440, 830 460, 830 470" fill="none" stroke="#4285f4" stroke-width="2.5" marker-end="url(#ahB)"/>

  <!-- LEAKY box: Oracle (i) -->
  <rect x="380" y="450" width="260" height="110" rx="12" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="510" y="478" text-anchor="middle" font-size="12" fill="#5c4400">CURRENT preference &#8226; how RLHF works</text>
  <text x="510" y="500" text-anchor="middle" font-size="14" font-weight="700" fill="#5c4400">Oracle (i): borrowed human value</text>
  <text x="510" y="520" text-anchor="middle" font-size="13" fill="#7a5c00">Converges, but LEAKY (Goodhart) &#8212;</text>
  <text x="510" y="538" text-anchor="middle" font-size="13" fill="#7a5c00">and suppresses transformation</text>
  <text x="510" y="554" text-anchor="middle" font-size="12" font-style="italic" fill="#5c4400">(the paradox)</text>

  <!-- FRONTIER box: Oracle (iii) -->
  <rect x="660" y="450" width="240" height="110" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="780" y="478" text-anchor="middle" font-size="12" fill="#13346b">FUTURE preference</text>
  <text x="780" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#13346b">Oracle (iii): predicted</text>
  <text x="780" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#13346b">future value</text>
  <text x="780" y="538" text-anchor="middle" font-size="13" fill="#13346b">THE OPEN FRONTIER</text>
  <text x="780" y="554" text-anchor="middle" font-size="12" font-style="italic" fill="#13346b">(Salganik et al. 2006)</text>

  <defs>
    <marker id="ahG" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34a853"/></marker>
    <marker id="ahA" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f9ab00"/></marker>
    <marker id="ahB" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4285f4"/></marker>
  </defs>
</svg>
